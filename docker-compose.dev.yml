version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nau-timesheet-postgres
    environment:
      POSTGRES_USER: nau_dev
      POSTGRES_PASSWORD: nau_dev_password
      POSTGRES_DB: nau_timesheet
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nau_dev -d nau_timesheet']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: nau-timesheet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_dev
      MINIO_ROOT_PASSWORD: minio_dev_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  createbuckets:
    image: minio/mc:latest
    container_name: nau-timesheet-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio_dev minio_dev_password;
      mc mb --ignore-existing local/nau-timesheet-screenshots;
      mc mb --ignore-existing local/nau-timesheet-photos;
      mc mb --ignore-existing local/nau-timesheet-exports;
      echo 'Buckets created successfully';
      "

volumes:
  postgres_data:
    name: nau-timesheet-postgres-data
  minio_data:
    name: nau-timesheet-minio-data
